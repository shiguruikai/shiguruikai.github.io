<div fxLayout="column" fxLayoutGap="0.5rem">
  <form [formGroup]="requestForm">
    <div fxLayout="row" fxLayoutGap="1rem">
      <!-- HTTPメソッド -->
      <mat-form-field fxFlex="7rem">
        <mat-label>Method</mat-label>
        <mat-select formControlName="method">
          <mat-option *ngFor="let it of httpMethods" [value]="it">{{ it }}</mat-option>
        </mat-select>
      </mat-form-field>
      <!-- リクエストURL -->
      <mat-form-field fxFlex="grow">
        <mat-label>Request URL</mat-label>
        <input matInput formControlName="url" />
      </mat-form-field>
    </div>

    <!--
    mat-stretch-tabs でタブのラベルを等間隔に引き伸ばす。
    ソース: https://github.com/angular/components/blob/master/src/material/tabs/tab-group.scss
   -->
    <mat-tab-group mat-stretch-tabs animationDuration="100ms">
      <mat-tab label="Headers">
        <!-- ng-template でタブの内容を遅延ロード -->
        <ng-template matTabContent>
          <div fxLayout="column" fxLayoutAlign="start start">
            <div
              fxLayout="row"
              fxLayoutAlign="start center"
              fxLayoutGap="1rem"
              fxFill
              *ngFor="let headerForm of controls.headerFormArray.controls; index as headerFormIndex"
              [formGroup]="headerForm"
            >
              <!-- ヘッダー名 -->
              <mat-form-field fxFlex="30">
                <mat-label>Header name</mat-label>
                <input
                  #headerName
                  matInput
                  formControlName="name"
                  [matAutocomplete]="autoHeaderName"
                  (focus)="initFilteredHeaderNameOptions(headerForm)"
                />
                <mat-autocomplete #autoHeaderName>
                  <mat-option *ngFor="let o of filteredHeaderNameOptions | async" [value]="o">{{ o }}</mat-option>
                </mat-autocomplete>
              </mat-form-field>

              <!-- ヘッダー値 -->
              <mat-form-field fxFlex="70">
                <mat-label>Header value</mat-label>
                <input matInput formControlName="value" [matAutocomplete]="autoHeaderValue" />
                <mat-autocomplete #autoHeaderValue>
                  <!-- ヘッダー名に応じて、ヘッダー値のオートコンプリートを設定する。 -->
                  <ng-container *ngIf="(headerName.value | lowercase) === 'content-type'">
                    <mat-option *ngFor="let o of contentTypeOptions" [value]="o">{{ o }}</mat-option>
                  </ng-container>
                </mat-autocomplete>
              </mat-form-field>

              <button type="button" mat-icon-button (click)="removeHeaderForm(headerFormIndex)">
                <mat-icon>clear</mat-icon>
              </button>
            </div>

            <button type="button" fxFill mat-stroked-button (click)="addHeaderForm()">
              <mat-icon>add</mat-icon>
              Add header
            </button>
          </div>
        </ng-template>
      </mat-tab>
      <mat-tab *ngIf="shouldShowBodyTab" label="Body">
        <ng-template matTabContent>
          <div fxLayout="column">
            <!-- Content-Type -->
            <mat-form-field>
              <mat-label>Content-Type</mat-label>
              <div [formGroup]="contentTypeForm">
                <input matInput formControlName="value" [matAutocomplete]="autoHeaderValue" />
              </div>
              <mat-autocomplete #autoHeaderValue>
                <mat-option *ngFor="let o of contentTypeOptions" [value]="o">{{ o }}</mat-option>
              </mat-autocomplete>
            </mat-form-field>
            <mat-form-field>
              <mat-label>Request body</mat-label>
              <textarea
                matInput
                matTextareaAutosize
                matAutosizeMinRows="2"
                mat-autosize
                formControlName="body"
              ></textarea>
            </mat-form-field>
          </div>
        </ng-template>
      </mat-tab>
      <mat-tab label="Variables">Variables</mat-tab>
    </mat-tab-group>

    <!-- 送信ボタン -->
    <button
      fxFill
      type="submit"
      mat-raised-button
      color="primary"
      [disabled]="requestForm.invalid || requesting"
      (click)="sendRequest()"
    >
      SEND
    </button>
  </form>

  <mat-progress-bar *ngIf="requesting" mode="indeterminate"></mat-progress-bar>

  <mat-divider fxFlexOffset="1rem"></mat-divider>

  <ng-container *ngIf="!requesting">
    <div fxLayout="row" fxLayoutAlign="start center" fxLayoutGap="1rem">
      <mat-chip-list>
        <mat-chip *ngIf="response" [class.bg-green]="successful" [class.bg-red]="!successful">
          {{ response.status }}
        </mat-chip>
        <mat-chip *ngIf="responseContentType">{{ responseContentType }}</mat-chip>
      </mat-chip-list>

      <a *ngIf="downloadUrl" [href]="downloadUrl" download="file.txt">
        <button mat-raised-button color="accent">SAVE</button>
      </a>
    </div>
    <div>
      <pre class="monospace overflow-scroll">{{ responseBody }}</pre>
    </div>
  </ng-container>

  <!-- デバッグ用 -->
  <div *ngIf="false">
    <h3>Debug</h3>
    <pre>{{ requestForm.value | json }}</pre>
  </div>
</div>
